<!-- Flat row: title + date + delete button -->
<div class="reportRow__header js-header">
    <div class="reportRow__col reportRow__col--title">
        <span class="reportRow__title js-title"></span>
    </div>
    <div class="reportRow__col reportRow__col--date js-date"></div>
    <div class="reportRow__col reportRow__col--actions">
        <button type="button" class="reportRow__btn reportRow__btn--delete js-deleteBtn">Delete</button>
    </div>
</div>
