<!-- Flat row: always visible, no expand/collapse -->
<div class="backlogRow__header js-header">
    <div class="backlogRow__col backlogRow__col--title">
        <span class="backlogRow__star js-star" aria-hidden="true">★</span>
        <span class="backlogRow__title js-title"></span>
    </div>
    <div class="backlogRow__col backlogRow__col--epic">
        <span class="backlogRow__epicPill js-epicPill"></span>
    </div>
    <div class="backlogRow__col backlogRow__col--category">
        <span class="backlogRow__categoryIcon js-categoryIcon"></span>
        <span class="backlogRow__categoryName js-categoryName"></span>
    </div>
    <div class="backlogRow__col backlogRow__col--date js-date"></div>
    <div class="backlogRow__col backlogRow__col--actions">
        <button type="button" class="backlogRow__btn backlogRow__btn--edit js-editBtn">Edit</button>
        <button type="button" class="backlogRow__btn backlogRow__btn--promote js-promoteBtn">Promote</button>
    </div>
</div>
