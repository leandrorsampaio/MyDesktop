<!-- Flat row for AI-staged task proposals -->
<div class="aiStagedRow__header">
    <div class="aiStagedRow__col aiStagedRow__col--title">
        <span class="aiStagedRow__star js-star" aria-hidden="true">★</span>
        <span class="aiStagedRow__title js-title"></span>
    </div>
    <div class="aiStagedRow__col aiStagedRow__col--epic">
        <span class="aiStagedRow__epicPill js-epicPill"></span>
    </div>
    <div class="aiStagedRow__col aiStagedRow__col--category">
        <span class="aiStagedRow__categoryIcon js-categoryIcon"></span>
        <span class="aiStagedRow__categoryName js-categoryName"></span>
    </div>
    <div class="aiStagedRow__col aiStagedRow__col--actions">
        <button type="button" class="aiStagedRow__btn js-editBtn">Edit</button>
        <button type="button" class="aiStagedRow__btn js-cloneBtn">Clone</button>
        <button type="button" class="aiStagedRow__btn aiStagedRow__btn--backlog js-promoteBacklogBtn">→ Backlog</button>
        <button type="button" class="aiStagedRow__btn aiStagedRow__btn--board js-promoteBoardBtn">→ Board</button>
        <button type="button" class="aiStagedRow__btn aiStagedRow__btn--delete js-deleteBtn">Delete</button>
    </div>
</div>
